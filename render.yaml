services:
  # Frontend React App (Vite)
  - type: web
    name: atlantic-esim-frontend
    env: docker
    plan: free # Change to starter/pro for production
    region: frankfurt
    dockerfile: ./frontend/Dockerfile
    healthCheckPath: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://atlantic-esim-api.onrender.com/api/v1
      - key: VITE_STRIPE_KEY
        sync: false
      - key: VITE_APP_NAME
        value: Atlantic eSIM
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_ENABLE_ANALYTICS
        value: "true"
      - key: VITE_ENABLE_NOTIFICATIONS
        value: "true"

  # Main Web Service (NestJS API)
  - type: web
    name: atlantic-esim-api
    env: docker
    plan: free # Change to starter/pro for production
    region: frankfurt # Choose closest region
    buildCommand: "./scripts/render-build.sh"
    startCommand: "npm run start:prod"
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: atlantic-esim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://atlantic-esim-frontend.onrender.com
      - key: AIRALO_CLIENT_ID
        sync: false
      - key: AIRALO_CLIENT_SECRET
        sync: false
      - key: ESIM_GO_API_KEY
        sync: false
      # Additional keys from .env
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  # Managed PostgreSQL Database
  - name: atlantic-esim-db
    databaseName: atlantic_esim
    user: atlantic_user
    plan: free # Change to starter/pro for production
    region: frankfurt

