services:
  # Main Web Service (NestJS API)
  - type: web
    name: atlantic-esim-api
    env: docker
    plan: free # Change to starter/pro for production
    region: frankfurt # Choose closest region
    buildCommand: "./scripts/render-build.sh"
    startCommand: "npm run start:prod"
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: atlantic-esim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # You need to manually add these sensitive keys in the Render Dashboard after creation
      - key: AIRALO_CLIENT_ID
        sync: false
      - key: AIRALO_CLIENT_SECRET
        sync: false
      - key: ESIM_GO_API_KEY
        sync: false

databases:
  # Managed PostgreSQL Database
  - name: atlantic-esim-db
    databaseName: atlantic_esim
    user: atlantic_user
    plan: free # Change to starter/pro for production
    region: frankfurt

